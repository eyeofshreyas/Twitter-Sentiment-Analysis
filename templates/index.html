<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweet Sentiment</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #e7e9ea;
            min-height: 100vh;
            padding: 48px 20px 40px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: #71767b;
            margin-bottom: 28px;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            background: #1e2d3d;
            border: 1px solid #2d3f50;
            border-radius: 8px;
            color: #e7e9ea;
            font-size: 16px;
            font-family: inherit;
            line-height: 1.6;
            padding: 14px;
            resize: none;
            height: 130px;
            outline: none;
            transition: border-color 0.15s;
            -webkit-appearance: none;
        }

        textarea:focus {
            border-color: #1d9bf0;
        }

        textarea::placeholder {
            color: #4a5568;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 12px;
        }

        .char {
            font-size: 13px;
            color: #71767b;
            flex-shrink: 0;
        }

        .char.warn { color: #f4a100; }
        .char.over { color: #f4212e; }

        button {
            background: #1d9bf0;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            min-height: 44px;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        button:hover { background: #1a8cd8; }
        button:active { background: #1577b5; }
        button:disabled { opacity: 0.45; cursor: default; }

        @media (max-width: 480px) {
            body { padding: 28px 16px 32px; }
            h1 { font-size: 22px; }
            .row { flex-direction: column-reverse; align-items: stretch; }
            button { width: 100%; text-align: center; border-radius: 10px; font-size: 16px; }
            .char { text-align: right; }
        }

        /* result */
        .result-box {
            margin-top: 24px;
            background: #1e2d3d;
            border: 1px solid #2d3f50;
            border-radius: 8px;
            padding: 20px;
            animation: up 0.2s ease;
        }

        @media (max-width: 480px) {
            .result-box { padding: 16px; }
            .verdict { font-size: 20px; }
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .verdict {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .verdict.positive { color: #00ba7c; }
        .verdict.negative { color: #f4212e; }

        .tweet-echo {
            font-size: 14px;
            color: #71767b;
            line-height: 1.6;
            border-left: 2px solid #2d3f50;
            padding-left: 12px;
            margin-bottom: 20px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #71767b;
            margin-bottom: 6px;
        }

        .bar-label span:last-child {
            color: #e7e9ea;
            font-weight: 600;
        }

        .track {
            background: #2d3f50;
            border-radius: 4px;
            height: 5px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(.4,0,.2,1);
        }

        .fill.positive { background: #00ba7c; }
        .fill.negative { background: #f4212e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tweet Sentiment</h1>
        <p class="subtitle">Paste any tweet and see how the model reads it.</p>

        <form method="POST" id="form">
            <textarea
                id="tweet"
                name="tweet"
                placeholder="Paste or type a tweet..."
                maxlength="280"
            >{{ tweet }}</textarea>

            <div class="row">
                <span class="char" id="charCount">280</span>
                <button type="submit" id="btn">Analyse</button>
            </div>
        </form>

        {% if result is not none %}
        <div class="result-box">
            <div class="verdict {{ result.lower() }}">
                {% if result == 'Positive' %}Positive{% else %}Negative{% endif %}
            </div>

            <div class="tweet-echo">{{ tweet }}</div>

            <div class="bar-label">
                <span>Confidence</span>
                <span>{{ confidence }}%</span>
            </div>
            <div class="track">
                <div class="fill {{ result.lower() }}" style="width: {{ confidence }}%"></div>
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        const ta = document.getElementById('tweet');
        const cc = document.getElementById('charCount');
        const btn = document.getElementById('btn');

        function sync() {
            const left = 280 - ta.value.length;
            cc.textContent = left;
            cc.className = 'char' + (left <= 0 ? ' over' : left <= 30 ? ' warn' : '');
            btn.disabled = !ta.value.trim();
        }

        ta.addEventListener('input', sync);
        sync();
    </script>
</body>
</html>
